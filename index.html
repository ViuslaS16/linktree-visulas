<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visula Siriwardana | Links</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-color: #f1f1f1;
            --text-color: #1a1c1c;
            --card-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --hover-bg: #000000;
            --hover-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .profile {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #000;
        }

        .role {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
            margin-top: 0.5rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 1.25rem 1.5rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--hover-bg);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }

        .link-btn:hover {
            border-color: var(--hover-bg);
        }

        .link-btn:hover::before {
            transform: translateY(0);
        }

        .link-label, .arrow {
            position: relative;
            z-index: 2;
            transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link-btn:hover .link-label,
        .link-btn:hover .arrow {
            color: var(--hover-text);
        }

        .arrow {
            font-size: 1.2rem;
            transform: translateX(0) translateY(0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link-btn:hover .arrow {
            transform: translateX(4px) translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .footer p {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive refinements */
        @media screen and (max-width: 480px) {
            body {
                padding: 1.5rem 1rem;
            }
            .container {
                gap: 2.5rem;
            }
            .logo {
                font-size: 2.2rem;
            }
            .link-btn {
                padding: 1rem 1.25rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="profile">
            <h1 class="logo">VISULAS</h1>
            <p class="role">Creative UI/UX Designer & Full-Stack Developer</p>
        </header>

        <main class="links-container" id="links-container">
            <a href="https://visulas.com" class="link-btn" target="_blank" rel="noopener">
                <span class="link-label">Portfolio</span>
                <span class="arrow">↗</span>
            </a>
            <a href="https://linkedin.com/in/visula-siriwardhana-b206631aa" class="link-btn" target="_blank" rel="noopener">
                <span class="link-label">LinkedIn</span>
                <span class="arrow">↗</span>
            </a>
            <a href="https://github.com/ViuslaS16" class="link-btn" target="_blank" rel="noopener">
                <span class="link-label">GitHub</span>
                <span class="arrow">↗</span>
            </a>
            <a href="https://www.instagram.com/visula_s" class="link-btn" target="_blank" rel="noopener">
                <span class="link-label">Instagram</span>
                <span class="arrow">↗</span>
            </a>
            <a href="https://wa.me/+94786714988" class="link-btn" target="_blank" rel="noopener">
                <span class="link-label">WhatsApp</span>
                <span class="arrow">↗</span>
            </a>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Visula Siriwardana</p>
        </footer>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const linksContainer = document.getElementById('links-container');
            const links = linksContainer.querySelectorAll('.link-btn');
            
            // Staggered reveal animation
            links.forEach((link, index) => {
                setTimeout(() => {
                    link.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                    link.style.opacity = '1';
                    link.style.transform = 'translateY(0)';
                }, 150 + (index * 100));
            });
        });
    </script>
</body>
</html>
